<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ .Site.Params.tagline }}">
  <title>{{ .Site.Title }}</title>
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ "css/pico.min.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.setAttribute('data-theme', saved);
      }
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#main-content">Zum Inhalt springen</a>

  <header class="container">
    <nav>
      <ul>
        <li><a href="{{ "/" | relURL }}"><strong>{{ .Site.Title }}</strong></a></li>
      </ul>
      <button class="nav-toggle" type="button" aria-label="Menü öffnen" aria-expanded="false" aria-controls="nav-links">
        <span class="nav-toggle-icon-open">{{ partial "icons/menu.html" . }}</span>
        <span class="nav-toggle-icon-close">{{ partial "icons/x.html" . }}</span>
      </button>
      <ul id="nav-links" class="nav-links">
        <li><a href="#leistungen">Leistungen</a></li>
        <li><a href="#ablauf">Ablauf</a></li>
        <li><a href="#portfolio">Portfolio</a></li>
        <li><a href="#ueber-mich">Über mich</a></li>
        <li><a href="#kontakt" role="button">Kontakt</a></li>
        <li>
          <button class="theme-toggle" type="button" aria-label="Zu hellem Modus wechseln">
            <span class="theme-toggle-icon-sun">{{ partial "icons/sun.html" . }}</span>
            <span class="theme-toggle-icon-moon">{{ partial "icons/moon.html" . }}</span>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <main class="container" id="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="container">
    {{ partial "social-links.html" . }}
    <small>
      &copy; {{ now.Year }} {{ .Site.Title }} ·
      <a href="{{ "/impressum/" | relURL }}">Impressum</a> ·
      <a href="{{ "/datenschutz/" | relURL }}">Datenschutz</a>
    </small>
  </footer>

  <script src="{{ "js/slideshow.js" | relURL }}" defer></script>
  <script src="{{ "js/nav.js" | relURL }}" defer></script>
  <script src="{{ "js/theme.js" | relURL }}" defer></script>
</body>
</html>
